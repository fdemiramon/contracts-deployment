name: Deploy or upgrade the core smart contracts
description: Trigger a deployment to a network.
title: "Leave the title blank as the workflow will override it"
labels: ["Deploy"]
body:
  - type: markdown
    attributes:
      value: |
        Deploy or upgrade KeyringCore to a network.
  - type: dropdown
    id: networkName
    attributes:
      label: Network Name
      description: For upgrade, pick the name in the /networks folder. For new deployment, use a new name. Network name must be all uppercase letters, numbers, and hyphens.
      options:
        - "✅ ETHEREUM_SEPOLIA (not deployed)"
        - "❌ STAGING (not deployed)"
        - "❌ UAT (not deployed)"
        - "❌ PROD_MAINNET (not deployed)"
        - "❌ PROD_ARBITRUM (not deployed)"
        - "❌ PROD_BASE (not deployed)"
        - "❌ PROD_OPTIMISM (not deployed)"
        - "❌ PROD_AVALANCHE (not deployed)"
        - "❌ PROD_ZKSYNC (not deployed)"
        - "❌ PROD_POLYGON (not deployed)"

    validations:
      required: true
  - type: input
    id: tagOrCommit
    attributes:
      label: Tag semver or Commit hash
      description: Get the tag or commit hash from the Github page of the KeyringCore repo.
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Comments
      description: Add comments related to this deployment
      placeholder: This is a new deployment for the Foo network as ...
    validations:
      required: false
