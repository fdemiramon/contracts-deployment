name: Refresh Network Configurations

permissions:
  issues: write
  contents: write

on:
  issues:
    types: [opened]

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'Refresh')
    steps:
      - name: Add initial comment
        uses: actions/github-script@v6
        with:
          script: |
            const workflowRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Refresh workflow began\n\n📊 [View workflow progress](${workflowRunUrl})`
            });

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check Network Configurations and Update Template
        uses: actions/github-script@v6
        env:
          CREDENTIALS: ${{ secrets.credentials }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const credentials = JSON.parse(process.env.CREDENTIALS);
            const networks = Object.keys(credentials);

            // Function to check if a network configuration is complete
            const isNetworkConfigComplete = (config) => {
              return config.RPC_URL && 
                     config.PRIVATE_KEY && 
                     config.ETHERSCAN_API_KEY && 
                     config.ETHERSCAN_BASE_API_URL && 
                     config.SIGNATURE_CHECKER_NAME;
            };

            // Function to get network deployment status
            const getNetworkDeploymentStatus = (network) => {
              const addressFilePath = path.join("networks", network +".txt");
              console.log(addressFilePath);
              try {
                if (fs.existsSync(addressFilePath)) {
                  const address = fs.readFileSync(addressFilePath, "utf8").trim();
                  return "Deployed at " + address;
                }
                return "Not deployed";
              } catch (error) {
                console.error(`Error checking network ${network}:`, error);
                return "Deployment status unknown";
              }
            };

            // Generate network status table
            let networkTable = '# Network Status Overview\n\n';
            networkTable += '| Network | Configuration | Address | RPC | PK | Etherscan API | Etherscan URL | Sig Checker |\n';
            networkTable += '|---------|---------------|---------|-----|----|--------------|--------------|--------------|\n';

            for (const network of networks) {
              const config = credentials[network];
              const configStatus = isNetworkConfigComplete(config) ? '✅' : '❌';
              const deployStatus = getNetworkDeploymentStatus(network);
              
              networkTable += `| ${network} | ${configStatus} | ${deployStatus} |`;
              networkTable += ` ${config.RPC_URL ? '✅' : '❌'} |`;
              networkTable += ` ${config.PRIVATE_KEY ? '✅' : '❌'} |`;
              networkTable += ` ${config.ETHERSCAN_API_KEY ? '✅' : '❌'} |`;
              networkTable += ` ${config.ETHERSCAN_BASE_API_URL ? '✅' : '❌'} |`;
              networkTable += ` ${config.SIGNATURE_CHECKER_NAME ? '✅' : '❌'} |\n`;
            }

            // Create the template structure
            const template = {
              name: "Deploy or upgrade the core smart contracts",
              description: "Trigger a deployment to a network.",
              title: "Leave the title blank as the workflow will override it",
              labels: ["Deploy"],
              body: [
                {
                  type: "markdown",
                  attributes: {
                    value: networkTable
                  }
                },
                {
                  type: "dropdown",
                  id: "networkName",
                  attributes: {
                    label: "Network Name",
                    description: "For upgrade, pick the name in the /networks folder. For new deployment, use a new name. Network name must be all uppercase letters, numbers, and hyphens.",
                    options: networks.map(network => network)
                  },
                  validations: {
                    required: true
                  }
                },
                {
                  type: "input",
                  id: "tagOrCommit",
                  attributes: {
                    label: "Tag semver or Commit hash",
                    description: "Get the tag or commit hash from the Github page of the KeyringCore repo."
                  },
                  validations: {
                    required: true
                  }
                },
                {
                  type: "textarea",
                  id: "what-happened",
                  attributes: {
                    label: "Comments",
                    description: "Add comments related to this deployment",
                    placeholder: "This is a new deployment for the Foo network as ..."
                  },
                  validations: {
                    required: false
                  }
                }
              ]
            };

            // Convert to YAML-compatible string with proper indentation
            const yamlContent = JSON.stringify(template, null, 2)
              .replace(/"([^"]+)":/g, '$1:')  // Remove quotes from keys
              .replace(/: "([^"]+)"/g, ': $1') // Remove quotes from simple values
              .replace(/\[\s+"([^"]+)"\s+\]/g, '[$1]') // Fix array formatting
              .replace(/\[\s*([^,\]]+(?:,\s*[^,\]]+)*)\s*\]/g, '[$1]'); // Fix array formatting

            // Write the template
            fs.writeFileSync('.github/ISSUE_TEMPLATE/deployment.yml', yamlContent);

            // Configure git
            await exec.exec('git', ['config', '--global', 'user.email', 'github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['config', '--global', 'user.name', 'github-actions[bot]']);

            // Show git status for debugging
            console.log('\nGit status:');
            await exec.exec('git', ['status']);

            // Commit and push changes
            await exec.exec('git', ['add', '.github/ISSUE_TEMPLATE/deployment.yml']);
            await exec.exec('git', ['commit', '-m', 'chore: update network options and status table in deployment template']);
            await exec.exec('git', ['push']);

      - name: Handle Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Failure']
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Refresh workflow failed.\n\nPlease check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for more details.`
            });

      - name: Handle Success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Success']
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Network configurations refresh completed successfully! The deployment template has been updated with the current list of networks.'
            });
