name: Refresh Network Configurations

permissions:
  issues: write
  contents: write

on:
  issues:
    types: [opened]

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'Refresh')
    steps:
      - name: Add initial comment
        uses: actions/github-script@v6
        with:
          script: |
            const workflowRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Refresh workflow began\n\n📊 [View workflow progress](${workflowRunUrl})`
            });

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check Network Configurations and Update Template
        uses: actions/github-script@v6
        env:
          CREDENTIALS: ${{ secrets.credentials }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const credentials = JSON.parse(process.env.CREDENTIALS);
            const networks = Object.keys(credentials);

            // Function to check if a network configuration is complete
            const isNetworkConfigComplete = (config) => {
              return config.RPC_URL && 
                     config.PRIVATE_KEY && 
                     config.ETHERSCAN_API_KEY && 
                     config.ETHERSCAN_BASE_API_URL && 
                     config.SIGNATURE_CHECKER_NAME;
            };

            // Function to get network deployment status
            const getNetworkDeploymentStatus = (network) => {
            const addressFilePath = path.join("networks", network +".txt");
            console.log(addressFilePath);
            try {
                if (fs.existsSync(addressFilePath)) {
                const address = fs.readFileSync(addressFilePath, "utf8").trim();
                return "Deployed at " + address;
                }
                return "Not deployed";
            } catch (error) {
                console.error(`Error checking network ${network}:`, error);
                return "Deployment status unknown";
            }
            };
            // Generate report for the issue
            let report = '# Network Configurations Status\n\n';
            for (const network of networks) {
              const config = credentials[network];
              const checks = {
                RPC_URL: !!config.RPC_URL,
                PRIVATE_KEY: !!config.PRIVATE_KEY,
                ETHERSCAN_API_KEY: !!config.ETHERSCAN_API_KEY,
                ETHERSCAN_BASE_API_URL: !!config.ETHERSCAN_BASE_API_URL,
                SIGNATURE_CHECKER_NAME: !!config.SIGNATURE_CHECKER_NAME
              };
              
              report += `## ${network}\n`;
              for (const [key, isSet] of Object.entries(checks)) {
                const status = isSet ? '✅' : '❌';
                report += `- ${status} ${key}\n`;
              }
              report += '\n';
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

            // Update deployment template
            const templatePath = '.github/ISSUE_TEMPLATE/deployment.yml';

            // Log current directory contents for debugging
            console.log('Current directory contents:');
            await exec.exec('ls', ['-la']);
            console.log('\nNetworks directory contents:');
            await exec.exec('ls', ['-la', 'networks']);

            let template = fs.readFileSync(templatePath, 'utf8');

            // Find the options section and replace it
            const optionsIndent = '        - ';
            const networkOptions = networks.map(network => {
              const config = credentials[network];
              const configStatus = isNetworkConfigComplete(config) ? '✅' : '❌';
              const deployStatus = getNetworkDeploymentStatus(network);
              const deploymentInfo = deployStatus.startsWith('0x') ? 
                `(${deployStatus.slice(0, 8)}...)` : 
                `(${deployStatus})`;
              return `${optionsIndent}"${configStatus} ${network} ${deploymentInfo}"`;
            }).join('\n');

            // Replace the existing options
            const optionsRegex = /(\s+options:\n)([^\n]*\n)*?(\s+validations:)/s;
            const updatedTemplate = template.replace(
              optionsRegex,
              `$1${networkOptions}\n\n    validations:`
            );

            // Write the updated template back
            fs.writeFileSync(templatePath, updatedTemplate);

            // Configure git
            await exec.exec('git', ['config', '--global', 'user.email', 'github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['config', '--global', 'user.name', 'github-actions[bot]']);

            // Show git status for debugging
            console.log('\nGit status:');
            await exec.exec('git', ['status']);

            // Commit and push changes
            await exec.exec('git', ['add', templatePath]);
            await exec.exec('git', ['commit', '-m', 'chore: update network options in deployment template']);
            await exec.exec('git', ['push']);

      - name: Handle Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Failure']
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Refresh workflow failed.\n\nPlease check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for more details.`
            });

      - name: Handle Success
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['Success']
            });
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Network configurations refresh completed successfully! The deployment template has been updated with the current list of networks.'
            });
